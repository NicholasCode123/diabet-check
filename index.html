<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DiabetCheck — Deteksi Risiko Diabetes</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>DiabetCheck</h1>
    <p>Deteksi Risiko Diabetes</p>
  </header>

  <main>
    <section class="form-section">
      <h2>Masukkan Data Kesehatan</h2>

      <div class="grid">
        <div class="field">
          <label for="Pregnancies">Kehamilan (kali)</label>
          <input type="number" id="Pregnancies" min="0" max="20" placeholder="0" step="1">
        </div>
        <div class="field">
          <label for="Age">Usia (tahun)</label>
          <input type="number" id="Age" min="1" max="120" placeholder="30" step="1">
        </div>
        <div class="field">
          <label for="Glucose">Glukosa Plasma (mg/dL)</label>
          <input type="number" id="Glucose" min="0" max="300" placeholder="120" step="1">
        </div>
        <div class="field">
          <label for="BloodPressure">Tekanan Darah Diastolik (mmHg)</label>
          <input type="number" id="BloodPressure" min="0" max="200" placeholder="70" step="1">
        </div>
        <div class="field">
          <label for="SkinThickness">Ketebalan Kulit (mm)</label>
          <input type="number" id="SkinThickness" min="0" max="100" placeholder="20" step="1">
        </div>
        <div class="field">
          <label for="Insulin">Insulin (μU/mL)</label>
          <input type="number" id="Insulin" min="0" max="1000" placeholder="80" step="1">
        </div>
        <div class="field">
          <label for="BMI">BMI (kg/m²)</label>
          <input type="number" id="BMI" min="0" max="70" placeholder="28.5" step="0.1">
        </div>
        <div class="field">
          <label for="DiabetesPedigreeFunction">Diabetes Pedigree (0.07–2.42)</label>
          <input type="number" id="DiabetesPedigreeFunction" min="0" max="5" placeholder="0.5" step="0.001">
        </div>
      </div>

      <p class="note">* Isi 0 untuk kolom yang tidak diketahui nilainya.</p>

      <button id="predictBtn" onclick="predict()">Analisis Sekarang</button>

      <div id="error-msg" class="error-msg"></div>
    </section>

    <section id="result" class="result-section">
      <div class="result-header">
        <span id="bulet"></span>
        <div>
          <div id="resultTitle" class="result-title"></div>
          <div id="resultdesc" class="result-desc"></div>
        </div>
      </div>

      <div class="prob-row">
        <span>Probabilitas Diabetes</span>
        <span id="probPct"></span>
      </div>
      <div class="prob-track">
        <div class="prob-fill" id="probFill"></div>
      </div>

      <ul id="adviceList" class="advice-list"></ul>

      <p class="disclaimer">⚠️ Hasil ini bukan diagnosis medis. Konsultasikan dengan dokter untuk pemeriksaan lebih lanjut.</p>
    </section>
  </main>



  <script src="script.js"></script>
</body>
</html>
